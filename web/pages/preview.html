<script>

const API = 'http://localhost:3000';
var personas = [], selectedCity = 'hangzhou', selectedPersona = '', answers = {}, currentQuiz = 0, questions = [], guideResult = null, completed = new Set(), allCities = [];

function cityLabel(slug) { return CITY_LABELS[slug] || slug; }

function showPage(id, title) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('navTitle').textContent = title || '丧亲行政事务导航';
}

function goCity() {
  showPage('city', '选择城市');
  allCities = Object.keys(CITY_LABELS);
  renderCityList(allCities);
}

var HOT_CITIES = ['beijing','shanghai','guangzhou','shenzhen','chengdu','hangzhou','wuhan','chongqing','nanjing','tianjin'];

function renderCityList(cities) {
  var q = (document.getElementById('citySearch').value || '').toLowerCase().trim();
  var filtered = q ? cities.filter(function(c){return c.indexOf(q)>=0 || (cityLabel(c)||'').indexOf(q)>=0}) : [];
  var html = '';
  if (q) {
    filtered.sort(function(a,b){
      if(a===q) return -1; if(b===q) return 1;
      if(a.indexOf(q)===0 && b.indexOf(q)!==0) return -1;
      if(b.indexOf(q)===0 && a.indexOf(q)!==0) return 1;
      return a.localeCompare(b);
    });
    html += '<div style="font-size:13px;color:#999;margin-bottom:8px">搜索结果('+filtered.length+'个)</div>';
    if(filtered.length===0) html += '<div style="text-align:center;padding:40px;color:#999">未找到匹配城市</div>';
    for(var i=0;i<filtered.length;i++) {
      var c=filtered[i], sel=selectedCity===c?' style="border-color:#8b7e6a;background:#f5f0eb"':'';
      html += '<div class="persona-card"'+sel+' onclick="selectCity(\''+c+'\')">'+cityLabel(c)+(selectedCity===c?' ✓':'')+'</div>';
    }
  } else {
    html += '<div style="font-size:13px;color:#999;margin-bottom:8px">热门城市</div>';
    for(var i=0;i<HOT_CITIES.length;i++) {
      var c=HOT_CITIES[i];
      if(cities.indexOf(c)<0) continue;
      var sel=selectedCity===c?' style="border-color:#8b7e6a;background:#f5f0eb"':'';
      html += '<div class="persona-card"'+sel+' onclick="selectCity(\''+c+'\')">'+cityLabel(c)+(selectedCity===c?' ✓':'')+'</div>';
    }
    html += '<div style="font-size:13px;color:#999;margin:16px 0 8px">全部城市('+cities.length+'个)</div>';
    for(var i=0;i<cities.length;i++) {
      var c=cities[i], sel=selectedCity===c?' style="border-color:#8b7e6a;background:#f5f0eb"':'';
      html += '<div class="persona-card"'+sel+' onclick="selectCity(\''+c+'\')">'+cityLabel(c)+(selectedCity===c?' ✓':'')+'</div>';
    }
  }
  document.getElementById('cityList').innerHTML = html;
}

function selectCity(slug) {
  selectedCity = slug;
  document.getElementById('cityDetect').textContent = '已选择: '+cityLabel(slug);
  renderCityList(allCities);
  setTimeout(function(){ goPersona(); }, 200);
}

function goPersona() {
  showPage('persona', '选择身份');
  document.getElementById('personaCity').textContent = cityLabel(selectedCity);
  var ids = ['retired_worker','active_worker','urban_resident','civil_servant','military'];
  var names = ['退休企业职工','在职企业职工','城乡居民(含农民)','公务员','军人'];
  var descs = [
    '参加城镇职工养老保险已办理退休的企业人员',
    '参加城镇职工养老保险的在职企业职工',
    '未参加职工养老保险的城乡居民、农民、务农人员',
    '在编公务员、事业单位人员',
    '现役军人、退役军人、军队离退休人员'
  ];
  var html = '';
  for(var i=0;i<ids.length;i++) {
    var extra = '';
    if(ids[i]==='urban_resident') extra = '<div style="font-size:12px;color:#e67e22;margin-top:4px">农民/务农人员请选此项</div>';
    if(ids[i]==='active_worker') extra = '<div style="font-size:12px;color:#e67e22;margin-top:4px">含农民工/灵活就业参保人员</div>';
    html += '<div class="persona-card" onclick="startQuiz(\''+ids[i]+'\')"><div class="name">'+names[i]+'</div><div class="desc">'+descs[i]+'</div>'+extra+'</div>';
  }
  document.getElementById('personaList').innerHTML = html;
}

    {k:'has_will', t:'逝者是否留有遗嘱?', o:[{l:'有',v:true},{l:'没有',v:false}]},
  ],
  military: [
    {k:'death_location', t:'逝者是在哪里离世的?', o:[{l:'医院',v:'at_hospital'},{l:'家中',v:'at_home'},{l:'意外/其他地点',v:'accident'}]},
    {k:'military_type', t:'逝者服役状态?', o:[{l:'现役军人',v:'active_duty'},{l:'退役军人',v:'retired'}]},
    {k:'is_martyr_case', t:'是否涉及烈士评定?', o:[{l:'是',v:true},{l:'否',v:false}]},
    {k:'has_real_estate', t:'逝者名下是否有房产?', o:[{l:'有',v:true},{l:'没有',v:false}]},
    {k:'has_commercial_insurance', t:'逝者是否购买了商业保险?', o:[{l:'有',v:true},{l:'没有',v:false}]},
    {k:'has_will', t:'逝者是否留有遗嘱?', o:[{l:'有',v:true},{l:'没有',v:false}]},
  ],
};

function startQuiz(personaId) {
  selectedPersona = personaId; answers = {}; currentQuiz = 0;
  questions = Q[personaId] || Q.retired_worker;
  showPage('quiz', '');
  renderQuiz();
}

function renderQuiz() {
  var q = questions[currentQuiz];
  var isLast = currentQuiz >= questions.length - 1;
  var hasAnswer = answers[q.k] !== undefined;
  var html = '<div class="progress"><div class="progress-fill" style="width:'+((currentQuiz+1)/questions.length*100)+'%"></div></div>';
  html += '<div class="progress-text">'+(currentQuiz+1)+' / '+questions.length+'</div>';
  html += '<div class="question">'+(typeof q.t==='function'?q.t():q.t)+'</div>';
  for(var i=0;i<q.o.length;i++) {
    var o=q.o[i], sel=answers[q.k]===o.v?' selected':'';
    html += '<div class="option'+sel+'" data-k="'+q.k+'" data-v="'+encodeURIComponent(JSON.stringify(o.v))+'" onclick="pickAnswer(this)">'+o.l+'</div>';
  }
  html += '<div style="display:flex;gap:10px">';
  if(currentQuiz>0) html += '<button class="next-btn" style="flex:1;background:#fff;color:#8b7e6a;border:2px solid #8b7e6a" onclick="prevQuiz()">上一题</button>';
  html += '<button class="next-btn"'+(hasAnswer?'':' disabled')+' onclick="'+(isLast?'submitQuiz()':'nextQuiz()')+'"'+(currentQuiz>0?' style="flex:1"':'')+'>'+(isLast?'生成清单':'下一题')+'</button>';
  html += '</div>';
  document.getElementById('quizContent').innerHTML = html;
}

function pickAnswer(el) {
  var key=el.dataset.k, value=JSON.parse(decodeURIComponent(el.dataset.v));
  answers[key]=value;
  var opts=el.parentElement.querySelectorAll('.option');
  for(var i=0;i<opts.length;i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
  setTimeout(function(){
    if(currentQuiz>=questions.length-1) submitQuiz(); else nextQuiz();
  },200);
}

function nextQuiz(){currentQuiz++;renderQuiz()}
function prevQuiz(){if(currentQuiz>0){currentQuiz--;renderQuiz()}

async function submitQuiz(){
  document.getElementById('quizContent').innerHTML='<div class="loading">生成中...</div>';
  try{
    var res=await fetch(API+'/api/guide',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({persona_id:selectedPersona,city:selectedCity,answers:answers})});
    guideResult=await res.json();
    showPage('timeline','办理清单');
    renderTimeline();
  }catch(e){document.getElementById('quizContent').innerHTML='<div class="error">网络错误，请重试</div>'}
}

async function renderTimeline(){

  var q=await getDataQuality(selectedCity);
  var banner=q==='full'?
    '<div style="background:#d4edda;border:1px solid #28a745;border-radius:10px;padding:14px;margin:0 12px 16px;font-size:14px;color:#155724;line-height:1.6">✅ 数据完整：殡仪馆名称/地址/电话均来自省级民政厅官网名录，已逐城核实。</div>':
    '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:14px;margin:0 12px 16px;font-size:14px;color:#856404;line-height:1.6">⚠️ 数据提示：殡仪馆名称正确，但具体地址和电话可能需要核实。<br>建议办理前拨打<b>'+cityLabel(selectedCity)+'12345</b>或当地民政局电话确认。</div>';
  var html='<div class="timeline-header"><div class="pname">'+g.persona.name+'</div><div class="psummary">'+g.summary.total_procedures+'项 · '+g.summary.critical_count+'项紧急 · 预计'+g.summary.estimated_days_min+'天</div></div>'+banner;
  for(var pi=0;pi<g.timeline.length;pi++){
    var phase=g.timeline[pi];
    html+='<div class="phase"><div class="phase-head"><span class="phase-icon">'+(icons[phase.phase]||'📌')+'</span><div><div class="phase-title">'+phase.title+'</div><div class="phase-time">'+(labels[phase.phase]||phase.phase)+'</div></div></div>';
    for(var i=0;i<phase.procedures.length;i++){
      var p=phase.procedures[i], done=completed.has(p.id);
      html+='<div class="proc-card'+(done?' done':'')+'" onclick="openDetail(\''+p.id+'\')"><span class="urgency '+p.urgency+'"></span><div class="proc-info"><div class="proc-name">'+(done?'✅ ':'')+p.name+'</div><div class="proc-where">📍 '+(p.where.resolved||p.where.name)+'</div></div><span class="proc-check">'+(done?'✅':'○')+'</span></div>';
    }
    html+='</div>';
  }
  document.getElementById('timelineContent').innerHTML=html;
}

function openDetail(procId){
  var proc=null;
  for(var pi=0;pi<guideResult.timeline.length;pi++){
    var found=guideResult.timeline[pi].procedures.find(function(p){return p.id===procId});
    if(found){proc=found;break}
  }
  if(!proc)return;
  showPage('detail','');
  var w=proc.where;
  var html='<div class="detail-name">'+proc.name+'</div>';
  html+='<span class="badge '+proc.urgency+'">'+(proc.urgency==='critical'?'紧急':proc.urgency==='high'?'重要':'正常')+'</span>';
  html+='<div class="section"><div class="section-title">📍 办理地点</div><div class="section-text">'+(w.resolved||w.name)+'</div>';
  if(w.address) html+='<div class="section-sub">'+w.address+'</div>';
  if(w.phone) html+='<div class="section-sub">📞 '+w.phone+'</div>';
  html+='</div>';
  html+='<div class="section"><div class="section-title">📋 需要携带的材料</div>';
  for(var i=0;i<proc.need.originals.length;i++) html+='<div class="material original">☐ '+proc.need.originals[i]+'(原件)</div>';
  for(var i=0;i<(proc.need.copies||[]).length;i++) html+='<div class="material">☐ '+proc.need.copies[i].doc+' 复印件×'+proc.need.copies[i].count+'</div>';
  html+='</div>';
  if(proc.output) html+='<div class="section"><div class="section-title">📤 办完后会得到</div><div class="section-text" style="color:#27ae60">'+proc.output+'</div></div>';
  if(proc.notes) html+='<div class="section"><div class="section-title">⚠️ 注意事项</div><div class="section-text" style="color:#e67e22;font-size:14px">'+proc.notes+'</div></div>';
  html+='<div class="btn-row">';
  html+='<button class="btn-done" onclick="toggleDone(\''+proc.id+'\')">'+(completed.has(proc.id)?'撤销完成':'标记为已完成')+'</button>';
  html+='<button class="btn-outline" onclick="showPage(\'timeline\',\'\');renderTimeline()">返回清单</button>';
  html+='<button class="btn-primary" onclick="alert(\'PDF生成需微信环境，当前为模拟预览\')">生成授权委托书</button>';
  html+='</div>';
  document.getElementById('detailContent').innerHTML=html;
}

function toggleDone(id){
  if(completed.has(id)) completed.delete(id); else completed.add(id);
  openDetail(id);
}

</script>
</body>
</html>
