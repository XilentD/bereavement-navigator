<script>
var API='http://localhost:3000';
var selectedCity='hangzhou',selectedPersona='',answers={},currentQuiz=0,questions=[],guideResult=null,completed=new Set(),allCities=[];

function L(s){return CITY_LABELS[s]||s}
function show(id,t){var ps=document.querySelectorAll('.pg');for(var i=0;i<ps.length;i++)ps[i].classList.remove('on');document.getElementById('pg-'+id).classList.add('on');document.getElementById('navTitle').textContent=t||'丧亲行政事务导航'}

function goCity(){show('city','选择城市');allCities=Object.keys(CITY_LABELS);renderCities()}

var HOT=['beijing','shanghai','guangzhou','shenzhen','chengdu','hangzhou','wuhan','chongqing','nanjing','tianjin'];

function renderCities(){
  var q=document.getElementById('citySearch').value.toLowerCase().trim();
  var h='';
  if(q){
    var f=allCities.filter(function(c){return c.indexOf(q)>=0||L(c).indexOf(q)>=0});
    f.sort(function(a,b){if(a===q)return -1;if(b===q)return 1;return a.localeCompare(b)});
    h+='<div style="font-size:13px;color:#999;margin-bottom:8px">搜索结果('+f.length+'个)</div>';
    if(!f.length)h+='<div style="text-align:center;padding:40px;color:#999">未找到匹配城市</div>';
    for(var i=0;i<f.length;i++){var c=f[i];h+='<div class="card" style="'+(selectedCity===c?'border-color:#8b7e6a;background:#f5f0eb':'')+'" onclick="pickCity(\''+c+'\')">'+L(c)+(selectedCity===c?' ✓':'')+'</div>'}
  }else{
    h+='<div style="font-size:13px;color:#999;margin-bottom:8px">热门城市</div>';
    for(var i=0;i<HOT.length;i++){var c=HOT[i];if(allCities.indexOf(c)<0)continue;h+='<div class="card" style="'+(selectedCity===c?'border-color:#8b7e6a;background:#f5f0eb':'')+'" onclick="pickCity(\''+c+'\')">'+L(c)+(selectedCity===c?' ✓':'')+'</div>'}
    h+='<div style="font-size:13px;color:#999;margin:16px 0 8px">全部城市('+allCities.length+'个)</div>';
    for(var i=0;i<allCities.length;i++){var c=allCities[i];h+='<div class="card" style="'+(selectedCity===c?'border-color:#8b7e6a;background:#f5f0eb':'')+'" onclick="pickCity(\''+c+'\')">'+L(c)+(selectedCity===c?' ✓':'')+'</div>'}
  }
  document.getElementById('cityList').innerHTML=h;
}

function pickCity(s){selectedCity=s;document.getElementById('cityDetect').textContent='已选择: '+L(s);renderCities();setTimeout(function(){goPersona()},200)}

function goPersona(){
  show('persona','选择身份');
  document.getElementById('personaCity').textContent='📍 '+L(selectedCity);
  var ids=['retired-worker','active-worker','urban-resident','civil-servant','military'];
  var ns=['退休企业职工','在职企业职工','城乡居民(含农民)','公务员','军人'];
  var ds=['参加城镇职工养老保险已退休的企业人员','参加城镇职工养老保险的在职职工','未参加职工养老保险的城乡居民、农民、务农人员','在编公务员、事业单位人员','现役军人、退役军人、军队离退休人员'];
  var h='';
  for(var i=0;i<ids.length;i++){
    var xt='';
    if(ids[i]==='urban-resident')xt='<div class="nt">⚠️ 农民/务农人员请选此项</div>';
    if(ids[i]==='active-worker')xt='<div class="nt">含农民工/灵活就业参保人员</div>';
    h+='<div class="card" onclick="startQuiz(\''+ids[i]+'\')"><div class="nm">'+ns[i]+'</div><div class="ds">'+ds[i]+'</div>'+xt+'</div>';
  }
  document.getElementById('personaList').innerHTML=h;
}

    {k:'has_commercial_insurance',t:'逝者是否购买了商业保险？',o:[{l:'有',v:true},{l:'没有',v:false}]},
    {k:'has_will',t:'逝者是否留有遗嘱？',o:[{l:'有',v:true},{l:'没有',v:false}]}
  ]
};

function startQuiz(id){selectedPersona=id;answers={};currentQuiz=0;questions=QS[id]||QS.retired-worker;show('quiz','');renderQuiz()}

function renderQuiz(){
  var q=questions[currentQuiz],isLast=currentQuiz>=questions.length-1,has=answers[q.k]!==undefined;
  var h='<div class="prog"><div class="progf" style="width:'+((currentQuiz+1)/questions.length*100)+'%"></div></div>';
  h+='<div class="ptxt">'+(currentQuiz+1)+' / '+questions.length+'</div>';
  h+='<div class="qt">'+(typeof q.t==='function'?q.t():q.t)+'</div>';
  for(var i=0;i<q.o.length;i++){var o=q.o[i];h+='<div class="opt'+(answers[q.k]===o.v?' sel':'')+'" data-k="'+q.k+'" data-v="'+encodeURIComponent(JSON.stringify(o.v))+'" onclick="pick(this)">'+o.l+'</div>'}
  h+='<div class="btc">';
  if(currentQuiz>0)h+='<button class="bt2" onclick="prevQ()">← 上一题</button>';
  h+='<button class="bt1"'+(has?'':' disabled')+' onclick="'+(isLast?'submitQuiz()':'nextQ()')+'">'+(isLast?'生成清单':'下一题 →')+'</button>';
  h+='</div>';
  document.getElementById('quizContent').innerHTML=h;
}

function pick(el){var k=el.dataset.k,v=JSON.parse(decodeURIComponent(el.dataset.v));answers[k]=v;var ops=el.parentElement.querySelectorAll('.opt');for(var i=0;i<ops.length;i++)ops[i].classList.remove('sel');el.classList.add('sel');setTimeout(function(){if(currentQuiz>=questions.length-1)submitQuiz();else nextQ()},200)}
function nextQ(){currentQuiz++;renderQuiz()}
function prevQ(){if(currentQuiz>0){currentQuiz--;renderQuiz()}}

async function submitQuiz(){
  document.getElementById('quizContent').innerHTML='<div class="ld">正在生成清单...</div>';
  try{
    var res=await fetch(API+'/api/guide',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({persona_id:selectedPersona,city:selectedCity,answers:answers})});
    guideResult=await res.json();show('timeline','办理清单');renderTimeline();
  }catch(e){document.getElementById('quizContent').innerHTML='<div class="er">网络错误，请重试</div>'}
}

async function renderTimeline(){
  var g=guideResult,ic={'24h':'⚠️','3d':'🕯️','7d':'📋','30d':'💰','90d':'🏠','long':'📝'};
  var lb={'24h':'24小时内','3d':'1-3天','7d':'3-7天','30d':'7-30天','90d':'30-90天','long':'长期'};
  var q=VF[selectedCity]?'full':'name';
  var bn=q==='full'?'<div class="ban">✅ 数据完整：殡仪馆名称/地址/电话均来自省级民政厅官网名录，已逐城核实。</div>':'<div class="ban2">⚠️ 殡仪馆名称正确，但具体地址电话可能需要核实。建议拨打 <b>'+L(selectedCity)+'12345</b> 确认。</div>';

  for(var pi=0;pi<g.timeline.length;pi++){
    var ph=g.timeline[pi];
    h+='<div class="ph"><div class="phd"><span class="pi">'+(ic[ph.phase]||'📌')+'</span><div><div class="pn2">'+ph.title+'</div><div class="pt2">'+(lb[ph.phase]||ph.phase)+'</div></div></div>';
    for(var i=0;i<ph.procedures.length;i++){
      var p=ph.procedures[i],dn=completed.has(p.id);
      h+='<div class="pc'+(dn?' dn':'')+'" onclick="openDt(\''+p.id+'\')"><span class="ud '+(p.urgency==='critical'?'cr':p.urgency==='high'?'hi':'no')+'"></span><div class="pi2"><div class="pn3">'+(dn?'✅ ':'')+p.name+'</div><div class="pw">📍 '+(p.where.resolved||p.where.name)+'</div></div><span class="ck">'+(dn?'✅':'○')+'</span></div>';
    }
    h+='</div>';
  }
  document.getElementById('timelineContent').innerHTML=h;
}

function openDt(pid){
  var p=null;
  for(var pi=0;pi<guideResult.timeline.length;pi++){var f=guideResult.timeline[pi].procedures.find(function(x){return x.id===pid});if(f){p=f;break}}
  if(!p)return;
  show('detail','');
  var w=p.where;
  var h='<div class="dn2">'+p.name+'</div>';
  h+='<span class="bd '+(p.urgency==='critical'?'cr':p.urgency==='high'?'hi':'no')+'">'+(p.urgency==='critical'?'紧急':p.urgency==='high'?'重要':'正常')+'</span>';
  h+='<div class="sec"><div class="st">📍 办理地点</div><div class="sv">'+(w.resolved||w.name)+'</div>';
  if(w.address)h+='<div class="ss">'+w.address+'</div>';
  if(w.phone)h+='<div class="ss">📞 '+w.phone+'</div>';
  h+='</div>';
  h+='<div class="sec"><div class="st">📋 需要携带的材料</div>';
  for(var i=0;i<p.need.originals.length;i++)h+='<div class="mt og">☐ '+p.need.originals[i]+'（原件）</div>';
  for(var i=0;i<(p.need.copies||[]).length;i++)h+='<div class="mt">☐ '+p.need.copies[i].doc+' 复印件×'+p.need.copies[i].count+'</div>';
  h+='</div>';
  if(p.output)h+='<div class="sec"><div class="st">📤 办完后会得到</div><div class="sv" style="color:#27ae60">'+p.output+'</div></div>';
  if(p.notes)h+='<div class="sec"><div class="st">⚠️ 注意事项</div><div class="sv" style="color:#e67e22;font-size:14px">'+p.notes+'</div></div>';
  h+='<div class="btc">';
  h+='<button class="bt3" onclick="toggleDone(\''+p.id+'\')">'+(completed.has(p.id)?'撤销完成':'标记为已完成')+'</button>';
  h+='<button class="bt1" onclick="genPDF()">📄 下载材料清单PDF</button>';
  h+='<button class="bt1" style="background:#5b4f3a" onclick="genLetter()">📝 生成授权委托书</button>';
  h+='<button class="bt2" onclick="show(\'timeline\',\'\');renderTimeline()">返回清单</button>';
  h+='<div style="margin-top:12px;text-align:center"><a href="#" onclick="showFeedback();return false" style="color:#999;font-size:13px">⚠️ 信息有误？反馈给我们</a></div>';
  h+='</div>';
  document.getElementById('detailContent').innerHTML=h;
}

function toggleDone(id){if(completed.has(id))completed.delete(id);else completed.add(id);openDt(id)}

// PDF generation
async function genPDF(){
  var btn=event.target; btn.textContent='生成中...'; btn.disabled=true;
  try{
    var res=await fetch(API+'/api/pdf/checklist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({persona_id:selectedPersona,city:selectedCity,answers:answers})});
    if(!res.ok){alert('PDF生成失败');return}
    var blob=await res.blob();
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='材料清单_'+L(selectedCity)+'.pdf';a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('PDF生成失败: '+e.message)}
  btn.textContent='📄 下载材料清单PDF'; btn.disabled=false;
}

async function genLetter(){
  var name=prompt('请输入代办人姓名：');
  if(!name)return;
  var id=prompt('请输入代办人身份证号：');
  if(!id)return;
  var rel=prompt('代办人与逝者关系（如：子女、配偶）：');
  if(!rel)return;
  var btn=event.target; btn.textContent='生成中...'; btn.disabled=true;
  try{
    var res=await fetch(API+'/api/pdf/delegation-letter',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({principalName:name,principalId:id,agentName:name,agentId:id,relationship:rel,deceasedName:'逝者',deceasedId:'',deathDate:'',persona_id:selectedPersona,city:selectedCity,answers:answers})});
    if(!res.ok){alert('委托书生成失败');return}
    var blob=await res.blob();
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='授权委托书_'+L(selectedCity)+'.pdf';a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('生成失败: '+e.message)}
  btn.textContent='📝 生成授权委托书'; btn.disabled=false;
}

// Feedback
function showFeedback(){
  var msg=prompt('请描述问题（如：地址错误、电话打不通、流程变更等）：\n\n我们会尽快核实修正。');
  if(!msg)return;
  fetch(API+'/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({city:selectedCity,persona:selectedPersona,message:msg,time:new Date().toISOString()})}).then(function(){alert('感谢反馈！我们会尽快核实。')}).catch(function(){alert('提交失败，请稍后重试')});
}
</script>
