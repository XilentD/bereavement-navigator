function L(s){return CITY_LABELS[s]||s}
function show(id,t){var ps=document.querySelectorAll('.pg');for(var i=0;i<ps.length;i++)ps[i].classList.remove('on');document.getElementById('pg-'+id).classList.add('on');document.getElementById('navTitle').textContent=t||'дё§дәІиЎҢж”ҝдәӢеҠЎеҜјиҲӘ'}

function goCity(){show('city','йҖүжӢ©еҹҺеёӮ');allCities=Object.keys(CITY_LABELS);renderCities()}

var HOT=['beijing','shanghai','guangzhou','shenzhen','chengdu','hangzhou','wuhan','chongqing','nanjing','tianjin'];

function renderCities(){
  var q=document.getElementById('citySearch').value.toLowerCase().trim();
  var h='';
  if(q){
    var f=allCities.filter(function(c){return c.indexOf(q)>=0||L(c).indexOf(q)>=0});
    f.sort(function(a,b){if(a===q)return -1;if(b===q)return 1;return a.localeCompare(b)});
    h+='<div style="font-size:13px;color:#999;margin-bottom:8px">жҗңзҙўз»“жһң('+f.length+'дёӘ)</div>';
    if(!f.length)h+='<div style="text-align:center;padding:40px;color:#999">жңӘжүҫеҲ°еҢ№й…ҚеҹҺеёӮ</div>';
    for(var i=0;i<f.length;i++){var c=f[i];h+='<div class="card" style="'+(selectedCity===c?'border-color:#8b7e6a;background:#f5f0eb':'')+'" onclick="pickCity(\''+c+'\')">'+L(c)+(selectedCity===c?' вң“':'')+'</div>'}
  }else{
    h+='<div style="font-size:13px;color:#999;margin-bottom:8px">зғӯй—ЁеҹҺеёӮ</div>';
    for(var i=0;i<HOT.length;i++){var c=HOT[i];if(allCities.indexOf(c)<0)continue;h+='<div class="card" style="'+(selectedCity===c?'border-color:#8b7e6a;background:#f5f0eb':'')+'" onclick="pickCity(\''+c+'\')">'+L(c)+(selectedCity===c?' вң“':'')+'</div>'}
    h+='<div style="font-size:13px;color:#999;margin:16px 0 8px">е…ЁйғЁеҹҺеёӮ('+allCities.length+'дёӘ)</div>';
    for(var i=0;i<allCities.length;i++){var c=allCities[i];h+='<div class="card" style="'+(selectedCity===c?'border-color:#8b7e6a;background:#f5f0eb':'')+'" onclick="pickCity(\''+c+'\')">'+L(c)+(selectedCity===c?' вң“':'')+'</div>'}
  }
  document.getElementById('cityList').innerHTML=h;
}

function pickCity(s){selectedCity=s;document.getElementById('cityDetect').textContent='е·ІйҖүжӢ©: '+L(s);renderCities();setTimeout(function(){goPersona()},200)}

function goPersona(){
  show('persona','йҖүжӢ©иә«д»Ҫ');

  var ds=['еҸӮеҠ еҹҺй•ҮиҒҢе·Ҙе…»иҖҒдҝқйҷ©е·ІйҖҖдј‘зҡ„дјҒдёҡдәәе‘ҳ','еҸӮеҠ еҹҺй•ҮиҒҢе·Ҙе…»иҖҒдҝқйҷ©зҡ„еңЁиҒҢиҒҢе·Ҙ','жңӘеҸӮеҠ иҒҢе·Ҙе…»иҖҒдҝқйҷ©зҡ„еҹҺд№Ўеұ…ж°‘гҖҒеҶңж°‘гҖҒеҠЎеҶңдәәе‘ҳ','еңЁзј–е…¬еҠЎе‘ҳгҖҒдәӢдёҡеҚ•дҪҚдәәе‘ҳ','зҺ°еҪ№еҶӣдәәгҖҒйҖҖеҪ№еҶӣдәәгҖҒеҶӣйҳҹзҰ»йҖҖдј‘дәәе‘ҳ'];
  var h='';
  for(var i=0;i<ids.length;i++){
    var xt='';
    if(ids[i]==='urban-resident')xt='<div class="nt">вҡ пёҸ еҶңж°‘/еҠЎеҶңдәәе‘ҳиҜ·йҖүжӯӨйЎ№</div>';
    if(ids[i]==='active-worker')xt='<div class="nt">еҗ«еҶңж°‘е·Ҙ/зҒөжҙ»е°ұдёҡеҸӮдҝқдәәе‘ҳ</div>';
    h+='<div class="card" onclick="startQuiz(\''+ids[i]+'\')"><div class="nm">'+ns[i]+'</div><div class="ds">'+ds[i]+'</div>'+xt+'</div>';
  }
  document.getElementById('personaList').innerHTML=h;
}

  ],

    {k:'death_location',t:'йҖқиҖ…жҳҜеңЁе“ӘйҮҢзҰ»дё–зҡ„пјҹ',o:[{l:'еҢ»йҷў',v:'at_hospital'},{l:'е®¶дёӯ',v:'at_home'},{l:'ж„ҸеӨ–/е…¶д»–ең°зӮ№',v:'accident'}]},
    {k:'has_work_injury',t:'жҳҜеҗҰеӣ е·ҘдҪңеҺҹеӣ еҜјиҮҙжӯ»дәЎпјҹ',o:[{l:'жҳҜ(е·ҘдәЎ)',v:true},{l:'еҗҰ',v:false}]},
    {k:'has_real_estate',t:'йҖқиҖ…еҗҚдёӢжҳҜеҗҰжңүжҲҝдә§пјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]},
    {k:'has_commercial_insurance',t:'йҖқиҖ…жҳҜеҗҰиҙӯд№°дәҶе•Ҷдёҡдҝқйҷ©пјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]},
    {k:'has_will',t:'йҖқиҖ…жҳҜеҗҰз•ҷжңүйҒ—еҳұпјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]}
  ],
  'urban-resident':[
    {k:'death_location',t:'йҖқиҖ…жҳҜеңЁе“ӘйҮҢзҰ»дё–зҡ„пјҹ',o:[{l:'еҢ»йҷў',v:'at_hospital'},{l:'е®¶дёӯ',v:'at_home'},{l:'ж„ҸеӨ–/е…¶д»–ең°зӮ№',v:'accident'}]},
    {k:'has_rural_house',t:'йҖқиҖ…жҳҜеҗҰжңүеҶңжқ‘е®…еҹәең°еҸҠжҲҝеұӢпјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]},
    {k:'has_real_estate',t:'йҖқиҖ…еҗҚдёӢжҳҜеҗҰжңүеҹҺй•ҮжҲҝдә§пјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]},
    {k:'has_commercial_insurance',t:'йҖқиҖ…жҳҜеҗҰиҙӯд№°дәҶе•Ҷдёҡдҝқйҷ©пјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]},
    {k:'has_will',t:'йҖқиҖ…жҳҜеҗҰз•ҷжңүйҒ—еҳұпјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]}
  ],

    {k:'has_real_estate',t:'йҖқиҖ…еҗҚдёӢжҳҜеҗҰжңүжҲҝдә§пјҹ',o:[{l:'жңү',v:true},{l:'жІЎжңү',v:false}]},

function startQuiz(id){selectedPersona=id;answers={};currentQuiz=0;questions=QS[id]||QS.retired-worker;show('quiz','');renderQuiz()}

function renderQuiz(){
  var q=questions[currentQuiz],isLast=currentQuiz>=questions.length-1,has=answers[q.k]!==undefined;
  var h='<div class="prog"><div class="progf" style="width:'+((currentQuiz+1)/questions.length*100)+'%"></div></div>';
  h+='<div class="ptxt">'+(currentQuiz+1)+' / '+questions.length+'</div>';
  h+='<div class="qt">'+(typeof q.t==='function'?q.t():q.t)+'</div>';
  for(var i=0;i<q.o.length;i++){var o=q.o[i];h+='<div class="opt'+(answers[q.k]===o.v?' sel':'')+'" data-k="'+q.k+'" data-v="'+encodeURIComponent(JSON.stringify(o.v))+'" onclick="pick(this)">'+o.l+'</div>'}
  h+='<div class="btc">';
  if(currentQuiz>0)h+='<button class="bt2" onclick="prevQ()">вҶҗ дёҠдёҖйўҳ</button>';
  h+='<button class="bt1"'+(has?'':' disabled')+' onclick="'+(isLast?'submitQuiz()':'nextQ()')+'">'+(isLast?'з”ҹжҲҗжё…еҚ•':'дёӢдёҖйўҳ вҶ’')+'</button>';
  h+='</div>';
  document.getElementById('quizContent').innerHTML=h;
}

function pick(el){var k=el.dataset.k,v=JSON.parse(decodeURIComponent(el.dataset.v));answers[k]=v;var ops=el.parentElement.querySelectorAll('.opt');for(var i=0;i<ops.length;i++)ops[i].classList.remove('sel');el.classList.add('sel');setTimeout(function(){if(currentQuiz>=questions.length-1)submitQuiz();else nextQ()},200)}
function nextQ(){currentQuiz++;renderQuiz()}
function prevQ(){if(currentQuiz>0){currentQuiz--;renderQuiz()}}

async function submitQuiz(){
  document.getElementById('quizContent').innerHTML='<div class="ld">жӯЈеңЁз”ҹжҲҗжё…еҚ•...</div>';
  try{
    var res=await fetch(API+'/api/guide',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({persona_id:selectedPersona,city:selectedCity,answers:answers})});
    guideResult=await res.json();show('timeline','еҠһзҗҶжё…еҚ•');renderTimeline();
  }catch(e){document.getElementById('quizContent').innerHTML='<div class="er">зҪ‘з»ңй”ҷиҜҜпјҢиҜ·йҮҚиҜ•</div>'}
}

async function renderTimeline(){
  var g=guideResult,ic={'24h':'вҡ пёҸ','3d':'рҹ•ҜпёҸ','7d':'рҹ“Ӣ','30d':'рҹ’°','90d':'рҹҸ ','long':'рҹ“қ'};
  var lb={'24h':'24е°Ҹж—¶еҶ…','3d':'1-3еӨ©','7d':'3-7еӨ©','30d':'7-30еӨ©','90d':'30-90еӨ©','long':'й•ҝжңҹ'};
  var q=VF[selectedCity]?'full':'name';
  var bn=q==='full'?'<div class="ban">вң… ж•°жҚ®е®Ңж•ҙпјҡж®Ўд»ӘйҰҶеҗҚз§°/ең°еқҖ/з”өиҜқеқҮжқҘиҮӘзңҒзә§ж°‘ж”ҝеҺ…е®ҳзҪ‘еҗҚеҪ•пјҢе·ІйҖҗеҹҺж ёе®һгҖӮ</div>':'<div class="ban2">вҡ пёҸ ж®Ўд»ӘйҰҶеҗҚз§°жӯЈзЎ®пјҢдҪҶе…·дҪ“ең°еқҖз”өиҜқеҸҜиғҪйңҖиҰҒж ёе®һгҖӮе»әи®®жӢЁжү“ <b>'+L(selectedCity)+'12345</b> зЎ®и®ӨгҖӮ</div>';
  var h='<div class="th"><div class="pn">'+g.persona.name+'</div><div class="ps">е…ұ '+g.summary.total_procedures+' йЎ№ В· '+g.summary.critical_count+' йЎ№зҙ§жҖҘ В· йў„и®Ў '+g.summary.estimated_days_min+' еӨ©</div></div>'+bn;
  for(var pi=0;pi<g.timeline.length;pi++){
    var ph=g.timeline[pi];
    h+='<div class="ph"><div class="phd"><span class="pi">'+(ic[ph.phase]||'рҹ“Ң')+'</span><div><div class="pn2">'+ph.title+'</div><div class="pt2">'+(lb[ph.phase]||ph.phase)+'</div></div></div>';
    for(var i=0;i<ph.procedures.length;i++){
      var p=ph.procedures[i],dn=completed.has(p.id);
      h+='<div class="pc'+(dn?' dn':'')+'" onclick="openDt(\''+p.id+'\')"><span class="ud '+(p.urgency==='critical'?'cr':p.urgency==='high'?'hi':'no')+'"></span><div class="pi2"><div class="pn3">'+(dn?'вң… ':'')+p.name+'</div><div class="pw">рҹ“Қ '+(p.where.resolved||p.where.name)+'</div></div><span class="ck">'+(dn?'вң…':'в—Ӣ')+'</span></div>';
    }
    h+='</div>';
  }
  document.getElementById('timelineContent').innerHTML=h;
}

function openDt(pid){
  var p=null;
  for(var pi=0;pi<guideResult.timeline.length;pi++){var f=guideResult.timeline[pi].procedures.find(function(x){return x.id===pid});if(f){p=f;break}}
  if(!p)return;
  show('detail','');
  var w=p.where;
  var h='<div class="dn2">'+p.name+'</div>';
  h+='<span class="bd '+(p.urgency==='critical'?'cr':p.urgency==='high'?'hi':'no')+'">'+(p.urgency==='critical'?'зҙ§жҖҘ':p.urgency==='high'?'йҮҚиҰҒ':'жӯЈеёё')+'</span>';
  h+='<div class="sec"><div class="st">рҹ“Қ еҠһзҗҶең°зӮ№</div><div class="sv">'+(w.resolved||w.name)+'</div>';
  if(w.address)h+='<div class="ss">'+w.address+'</div>';
  if(w.phone)h+='<div class="ss">рҹ“һ '+w.phone+'</div>';
  h+='</div>';
  h+='<div class="sec"><div class="st">рҹ“Ӣ йңҖиҰҒжҗәеёҰзҡ„жқҗж–ҷ</div>';
  for(var i=0;i<p.need.originals.length;i++)h+='<div class="mt og">вҳҗ '+p.need.originals[i]+'пјҲеҺҹд»¶пјү</div>';
  for(var i=0;i<(p.need.copies||[]).length;i++)h+='<div class="mt">вҳҗ '+p.need.copies[i].doc+' еӨҚеҚ°д»¶Г—'+p.need.copies[i].count+'</div>';
  h+='</div>';
  if(p.output)h+='<div class="sec"><div class="st">рҹ“Ө еҠһе®ҢеҗҺдјҡеҫ—еҲ°</div><div class="sv" style="color:#27ae60">'+p.output+'</div></div>';
  if(p.notes)h+='<div class="sec"><div class="st">вҡ пёҸ жіЁж„ҸдәӢйЎ№</div><div class="sv" style="color:#e67e22;font-size:14px">'+p.notes+'</div></div>';
  h+='<div class="btc">';
  h+='<button class="bt3" onclick="toggleDone(\''+p.id+'\')">'+(completed.has(p.id)?'ж’Өй”Җе®ҢжҲҗ':'ж Үи®°дёәе·Іе®ҢжҲҗ')+'</button>';
  h+='<button class="bt1" onclick="genPDF()">рҹ“„ дёӢиҪҪжқҗж–ҷжё…еҚ•PDF</button>';
  h+='<button class="bt1" style="background:#5b4f3a" onclick="genLetter()">рҹ“қ з”ҹжҲҗжҺҲжқғе§”жүҳд№Ұ</button>';
  h+='<button class="bt2" onclick="show(\'timeline\',\'\');renderTimeline()">иҝ”еӣһжё…еҚ•</button>';
  h+='<div style="margin-top:12px;text-align:center"><a href="#" onclick="showFeedback();return false" style="color:#999;font-size:13px">вҡ пёҸ дҝЎжҒҜжңүиҜҜпјҹеҸҚйҰҲз»ҷжҲ‘д»¬</a></div>';
  h+='</div>';
  document.getElementById('detailContent').innerHTML=h;
}

function toggleDone(id){if(completed.has(id))completed.delete(id);else completed.add(id);openDt(id)}

// PDF generation
async function genPDF(){
  var btn=event.target; btn.textContent='з”ҹжҲҗдёӯ...'; btn.disabled=true;
  try{
    var res=await fetch(API+'/api/pdf/checklist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({persona_id:selectedPersona,city:selectedCity,answers:answers})});
    if(!res.ok){alert('PDFз”ҹжҲҗеӨұиҙҘ');return}
    var blob=await res.blob();
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='жқҗж–ҷжё…еҚ•_'+L(selectedCity)+'.pdf';a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('PDFз”ҹжҲҗеӨұиҙҘ: '+e.message)}
  btn.textContent='рҹ“„ дёӢиҪҪжқҗж–ҷжё…еҚ•PDF'; btn.disabled=false;
}

async function genLetter(){
  var name=prompt('иҜ·иҫ“е…Ҙд»ЈеҠһдәәе§“еҗҚпјҡ');
  if(!name)return;
  var id=prompt('иҜ·иҫ“е…Ҙд»ЈеҠһдәәиә«д»ҪиҜҒеҸ·пјҡ');
  if(!id)return;
  var rel=prompt('д»ЈеҠһдәәдёҺйҖқиҖ…е…ізі»пјҲеҰӮпјҡеӯҗеҘігҖҒй…ҚеҒ¶пјүпјҡ');
  if(!rel)return;
  var btn=event.target; btn.textContent='з”ҹжҲҗдёӯ...'; btn.disabled=true;
  try{
    var res=await fetch(API+'/api/pdf/delegation-letter',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({principalName:name,principalId:id,agentName:name,agentId:id,relationship:rel,deceasedName:'йҖқиҖ…',deceasedId:'',deathDate:'',persona_id:selectedPersona,city:selectedCity,answers:answers})});
    if(!res.ok){alert('е§”жүҳд№Ұз”ҹжҲҗеӨұиҙҘ');return}
    var blob=await res.blob();
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='жҺҲжқғе§”жүҳд№Ұ_'+L(selectedCity)+'.pdf';a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('з”ҹжҲҗеӨұиҙҘ: '+e.message)}
  btn.textContent='рҹ“қ з”ҹжҲҗжҺҲжқғе§”жүҳд№Ұ'; btn.disabled=false;
}

// Feedback
function showFeedback(){
  var msg=prompt('иҜ·жҸҸиҝ°й—®йўҳпјҲеҰӮпјҡең°еқҖй”ҷиҜҜгҖҒз”өиҜқжү“дёҚйҖҡгҖҒжөҒзЁӢеҸҳжӣҙзӯүпјүпјҡ\n\nжҲ‘д»¬дјҡе°Ҫеҝ«ж ёе®һдҝ®жӯЈгҖӮ');
  if(!msg)return;
  fetch(API+'/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({city:selectedCity,persona:selectedPersona,message:msg,time:new Date().toISOString()})}).then(function(){alert('ж„ҹи°ўеҸҚйҰҲпјҒжҲ‘д»¬дјҡе°Ҫеҝ«ж ёе®һгҖӮ')}).catch(function(){alert('жҸҗдәӨеӨұиҙҘпјҢиҜ·зЁҚеҗҺйҮҚиҜ•')});
}
